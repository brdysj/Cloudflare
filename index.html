<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的期末复习资料</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            display: flex;
            height: calc(100vh - 60px);
        }

        .sidebar {
            width: 250px;
            background: white;
            border-right: 1px solid #ddd;
            padding: 10px;
            overflow-y: auto;
        }

        .sidebar button {
            width: 100%;
            margin: 5px 0;
            padding: 10px;
            border: none;
            background: #3498db;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .sidebar button:hover {
            background: #2980b9;
        }

        .viewer {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eaeaea;
        }

        iframe {
            width: 95%;
            height: 95%;
            border: none;
            background: white;
        }
    </style>
</head>

<body>

<header>
    📚 期末复习资料在线查看系统
</header>

<div class="container">
    
    <div class="sidebar">
        <button onclick="openPDF('pdf/math.pdf')">高等数学</button>
        <button onclick="openPDF('pdf/english.pdf')">英语</button>
        <button onclick="openPDF('pdf/cs.pdf')">计算机基础</button>
    </div>

    <div class="viewer">
        <iframe id="pdfFrame" src=""></iframe>
    </div>

</div>

<script>
    function openPDF(file) {
        document.getElementById('pdfFrame').src = file;
    }

    // 默认打开第一个
    window.onload = function () {
        openPDF('pdf/math.pdf');
    }
</script>

</body>
</html>
